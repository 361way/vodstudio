name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build single HTML and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Build proxy binaries
        shell: bash
        run: |
          mkdir -p release-assets
          targets=(
            "linux amd64 vodserver-linux-amd64"
            "linux arm64 vodserver-linux-arm64"
            "darwin amd64 vodserver-macos-amd64"
            "darwin arm64 vodserver-macos-arm64"
          )

          for target in "${targets[@]}"; do
            read -r GOOS GOARCH OUT <<< "$target"
            echo "building $OUT"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags="-s -w" -o "release-assets/$OUT" ./proxy-server.go
          done

      - name: Read package version
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SAFE_SHA=${GITHUB_SHA::7}
          TAG="${VERSION}-${SAFE_SHA}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          test -f dist/index.html

      - name: Prepare release assets
        shell: bash
        run: |
          cp dist/index.html "release-assets/index.html"
          shasum -a 256 release-assets/* > release-assets/SHA256SUMS.txt
          ls -lh release-assets

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pkg.outputs.tag }}
          VERSION: ${{ steps.pkg.outputs.version }}
        shell: bash
        run: |
          NOTES=$(cat <<EOF
          Automated release for commit ${GITHUB_SHA}.

          Assets:
          - index.html: built single-file HTML from dist/index.html
          - proxy-server-linux-amd64: Linux x86_64 CORS proxy binary
          - proxy-server-linux-arm64: Linux arm64 CORS proxy binary
          - proxy-server-macos-amd64: macOS Intel CORS proxy binary
          - proxy-server-macos-arm64: macOS Apple Silicon CORS proxy binary
          - SHA256SUMS.txt: checksum file
          EOF
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete-asset "$TAG" "VodStudio-V${VERSION}.html" -y >/dev/null 2>&1 || true
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "VodStudio ${VERSION} (${GITHUB_SHA::7})" \
              --notes "$NOTES" \
              --latest
          fi
